services:

#  postgres:
#    image: postgres:16
#    container_name: postgres
#    environment:
#      POSTGRES_USER: demo
#      POSTGRES_PASSWORD: demo
#      POSTGRES_DB: demo
#    ports:
#      - "5432:5432"

  mysql:
    image: mysql:8.4
    container_name: airflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: demo
      MYSQL_USER: demo
      MYSQL_PASSWORD: demo
    ports:
      - "3306:3306"

  airflow-init:
    build: ./airflow
    container_name: airflow-init
    depends_on:
      - mysql
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
#      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://demo:demo@postgres:5432/demo
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqldb://demo:demo@mysql:3306/demo
    command: >
      bash -c "airflow db migrate &&
               airflow users create -u admin -p admin -f Admin -l User -r Admin -e admin@example.com; "
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./flyway/sql:/opt/airflow/flyway/sql

  airflow:
    build: ./airflow
    container_name: airflow
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
#      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://demo:demo@postgres:5432/demo
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqldb://demo:demo@mysql:3306/demo
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./flyway/sql:/opt/airflow/flyway/sql
    ports:
      - "8080:8080"
    command: webserver
#    command: api-server

  airflow-scheduler:
    build: ./airflow
    container_name: airflow-scheduler
    depends_on:
      - airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
#      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://demo:demo@postgres:5432/demo
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqldb://demo:demo@mysql:3306/demo
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./flyway/sql:/opt/airflow/flyway/sql
    command: scheduler

